name: Daily Card Data Pull

on:
  schedule:
    # Runs at 01:00 UTC daily (8:00 PM EST during Standard Time, 9:00 PM EDT during Daylight Saving Time)
    - cron: '0 1 * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_NO_WARNINGS: '1'

jobs:
  pull-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for committing and pushing back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas numpy

      - name: Run daily pull script
        run: python Code/full_pull.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global core.safecrlf false
          git add Data/
          git commit -m "Auto-update card data: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" || echo "No changes to commit"
          git push
